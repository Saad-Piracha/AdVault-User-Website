<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Metadata -->
    <title>AdVault — Pakistan’s First Smart In-Cab DOOH Advertising Platform</title>
    <meta name="description" content="Reach thousands of passengers daily with AdVault, Pakistan's leading smart in-cab digital advertising network. Geofenced, real-time analytics, and premium high-attention screens in Lahore." />
    <meta name="keywords" content="Lahore Advertising, Taxi Advertising Pakistan, Cab Advertising, Digital Out Of Home, DOOH Pakistan, In-Cab Advertising, Digital Screens, Geofencing Advertising" />
    <meta name="author" content="AdVault" />
    <meta name="theme-color" content="#07182d" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://advault.pk/" />
    <meta property="og:title" content="AdVault — Smart In-Cab Digital Advertising Platform" />
    <meta property="og:description" content="Digitizing outdoor advertising in Pakistan with connected in-cab digital screens, precise geofencing, and live campaign analytics." />
    <meta property="og:image" content="https://advault.pk/og-image.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://advault.pk/" />
    <meta property="twitter:title" content="AdVault — Smart In-Cab Digital Advertising Platform" />
    <meta property="twitter:description" content="Digitizing outdoor advertising in Pakistan with connected in-cab digital screens, precise geofencing, and live campaign analytics." />
    <meta property="twitter:image" content="https://advault.pk/og-image.png" />

    <!-- Preconnect for Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "AdVault",
        "image": "https://advault.pk/og-image.png",
        "@id": "https://advault.pk/#organization",
        "url": "https://advault.pk",
        "telephone": "+923234734649",
        "email": "advault03@gmail.com",
        "priceRange": "$$",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Gulberg",
          "addressLocality": "Lahore",
          "addressRegion": "Punjab",
          "postalCode": "54000",
          "addressCountry": "PK"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 31.5204,
          "longitude": 74.3587
        },
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": [
            "Monday",
            "Tuesday",
            "Wednesday",
            "Thursday",
            "Friday"
          ],
          "opens": "09:00",
          "closes": "18:00"
        },
        "sameAs": [
          "https://www.linkedin.com/company/advault",
          "https://www.instagram.com/advault"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
